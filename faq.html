<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F.A.Q · FORJA</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body{background:#fff}
  .overlay-header{position:sticky;color:#333;border-bottom:1px solid var(--line);background:#fff}
  .overlay-header .menu-btn span{background:#333}.overlay-header .logo-mark{color:#333;text-shadow:none}
  .overlay-header .hicon{color:#333}.overlay-header .cart-count{background:#333;color:#fff}
  .faq{max-width:820px;margin:0 auto;padding:4rem 2rem 6rem}
  .faq .eyebrow{text-align:center;text-transform:uppercase;letter-spacing:.25em;font-size:.66rem;color:#999}
  .faq h1{text-align:center;font-weight:400;font-size:2rem;letter-spacing:.05em;margin:.6rem 0 3rem}
  .acc{border-bottom:1px solid var(--line)}
  .acc-q{width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 0;font-size:1rem;font-weight:400}
  .acc-q span.ico{font-size:1.3rem;font-weight:300;transition:.3s}
  .acc.open .acc-q span.ico{transform:rotate(45deg)}
  .acc-a{max-height:0;overflow:hidden;transition:max-height .35s ease;color:#666;line-height:1.8}
  .acc-a p{padding:0 0 1.4rem}
</style>
</head>
<body>
  <header class="overlay-header">
    <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
    <a href="index.html" class="logo"><span class="logo-mark"><img src="logo.png" alt="Forja · Diseño · Madera · Acero"></span></a>
    <div class="header-actions">
      <button class="hicon cart-btn" id="cartBtn"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 7h12l-1 13H7L6 7z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M9 7a3 3 0 0 1 6 0" fill="none" stroke="currentColor" stroke-width="1.5"/></svg><span class="cart-count" id="cartCount">0</span></button>
    </div>
  </header>

  <section class="faq">
    <p class="eyebrow">F.A.Q</p>
    <h1>Preguntas frecuentes</h1>
    <div id="accList"></div>
  </section>

  <div class="menu-panel" id="menuPanel">
    <button class="menu-close" id="menuClose">×</button>
    <nav class="menu-nav"><a href="index.html">Inicio</a><a href="tienda.html">Muebles</a>
<div class="submenu"><a href="tienda.html?cat=centro">Mesa de Centro</a>
<a href="tienda.html?cat=auxiliar">Mesa Auxiliar</a>
<a href="tienda.html?cat=comedor">Mesa Comedor</a></div>
<a href="tienda.html?cat=sillas">Sillas</a>
<div class="submenu">
<a href="tienda.html?cat=silla-comedor">Silla Comedor</a>
<a href="tienda.html?cat=sitial">Sitial</a>
<a href="tienda.html?cat=banqueta">Banqueta</a>
<a href="tienda.html?cat=banca">Banca</a>
</div><a href="tienda.html?cat=terrazas">Terrazas</a>
<div class="submenu">
<a href="tienda.html?cat=terraza">Terraza</a>
</div><a href="tienda.html?cat=complementos">Complementos</a>
<div class="submenu">
<a href="tienda.html?cat=cojines">Cojines</a>
<a href="tienda.html?cat=maceteros">Maceteros</a>
<a href="tienda.html?cat=lamparas">Lámparas</a>
</div>
<a href="contacto.html">Contacto</a><a href="faq.html">FAQ</a></nav>
  </div>
  <div class="overlay-backdrop" id="backdrop"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-head"><h2>Carrito</h2><button class="menu-close" id="cartClose">×</button></div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer"><div class="cart-total"><span>Total</span><span id="cartTotal">$0</span></div><a href="checkout.html" class="btn-checkout">Ir a pagar</a></div>
  </aside>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    const faqs=[
      ['¿Hacen despachos a todo Chile?','Sí. Despachamos a todo el país. El plazo estimado es de 7 a 15 días hábiles según la región y la disponibilidad de la pieza.'],
      ['¿Cuáles son los medios de pago?','Aceptamos tarjetas de crédito y débito, además de transferencia bancaria. El detalle se confirma al finalizar la compra.'],
      ['¿Puedo visitar el showroom?','Por supuesto. Te esperamos en Gerónimo de Alderete 1450, local 5, Vitacura. Te recomendamos coordinar tu visita por WhatsApp.'],
      ['¿Realizan piezas a medida?','Sí. Desarrollamos proyectos a medida en distintas maderas y terminaciones. Escríbenos a hi@forja.cl con tu idea.'],
      ['¿Tienen política de cambios?','Aceptamos cambios dentro de los 10 días posteriores a la recepción, siempre que el producto esté en perfecto estado y con su embalaje original.'],
      ['¿Cómo cuido mis muebles de madera?','Limpia con un paño seco o levemente húmedo y evita la exposición directa al sol y a fuentes de calor para preservar el acabado.']
    ];
    document.getElementById('accList').innerHTML=faqs.map(([q,a])=>`
      <div class="acc"><button class="acc-q">${q}<span class="ico">+</span></button>
      <div class="acc-a"><p>${a}</p></div></div>`).join('');
    document.querySelectorAll('.acc-q').forEach(b=>b.onclick=()=>{
      const acc=b.parentElement,a=acc.querySelector('.acc-a');
      const open=acc.classList.toggle('open');
      a.style.maxHeight=open?a.scrollHeight+'px':0;
    });
  </script>
</body>
</html>
