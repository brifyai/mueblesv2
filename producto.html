<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto · FORJA</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body{background:#fff}
  .overlay-header{position:sticky;color:#333;border-bottom:1px solid var(--line);background:#fff}
  .overlay-header .menu-btn span{background:#333}.overlay-header .logo-mark{color:#333;text-shadow:none}
  .overlay-header .hicon{color:#333}.overlay-header .cart-count{background:#333;color:#fff}
  .pdp{max-width:1200px;margin:0 auto;padding:2.5rem 2rem 6rem}
  .crumbs{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:2rem}
  .crumbs a:hover{color:#333}
  .pdp-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:4rem;align-items:start}
  .pdp-img{aspect-ratio:4/5;overflow:hidden;background:#f6f4f0}
  .pdp-img img{width:100%;height:100%;object-fit:cover}
  .pdp-info h1{font-weight:400;font-size:1.7rem;line-height:1.3;margin-bottom:1rem}
  .pdp-price{font-size:1.3rem;color:#333;margin-bottom:1.8rem}
  .pdp-info p.desc{color:#666;line-height:1.8;margin-bottom:2rem}
  .qty{display:flex;align-items:center;gap:1.2rem;margin-bottom:1.6rem}
  .qty button{width:36px;height:36px;border:1px solid var(--line);font-size:1.1rem}
  .pdp-add{width:100%;background:#333;color:#fff;padding:1.1rem;letter-spacing:.18em;text-transform:uppercase;font-size:.72rem;transition:.25s}
  .pdp-add:hover{background:#000}
  .pdp-meta{margin-top:2rem;border-top:1px solid var(--line);padding-top:1.6rem;font-size:.85rem;color:#777;line-height:2}
  .pdp-meta strong{color:#444;font-weight:500}
  .related{max-width:1200px;margin:0 auto;padding:0 2rem 6rem}
  .related h2{text-align:center;font-weight:400;font-size:1.4rem;margin-bottom:2.5rem;letter-spacing:.05em}
  .rel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.8rem}
  .rel-grid .card{text-align:center}
  .rel-grid .ph{aspect-ratio:3/4;overflow:hidden;background:#f6f4f0;margin-bottom:.8rem;display:block}
  .rel-grid img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
  .rel-grid .card:hover img{transform:scale(1.05)}
  .rel-grid h3{font-weight:400;font-size:.9rem}.rel-grid .price{color:#777;font-size:.82rem;margin-top:.2rem}
  @media(max-width:820px){.pdp-grid{grid-template-columns:1fr;gap:2rem}.rel-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
  <header class="overlay-header">
    <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
    <a href="index.html" class="logo"><span class="logo-mark"><img src="logo.png" alt="Forja · Diseño · Madera · Acero"></span></a>
    <div class="header-actions">
      <button class="hicon cart-btn" id="cartBtn" aria-label="Carrito">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 7h12l-1 13H7L6 7z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M9 7a3 3 0 0 1 6 0" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <section class="pdp" id="pdp"></section>
  <section class="related"><h2>También te puede gustar</h2><div class="rel-grid" id="rel"></div></section>

  <div class="menu-panel" id="menuPanel">
    <button class="menu-close" id="menuClose">×</button>
    <nav class="menu-nav"><a href="index.html">Inicio</a><a href="tienda.html">Muebles</a>
<div class="submenu"><a href="tienda.html?cat=centro">Mesa de Centro</a>
<a href="tienda.html?cat=auxiliar">Mesa Auxiliar</a>
<a href="tienda.html?cat=comedor">Mesa Comedor</a></div>
<a href="tienda.html?cat=sillas">Sillas</a>
<div class="submenu">
<a href="tienda.html?cat=silla-comedor">Silla Comedor</a>
<a href="tienda.html?cat=sitial">Sitial</a>
<a href="tienda.html?cat=banqueta">Banqueta</a>
<a href="tienda.html?cat=banca">Banca</a>
</div><a href="tienda.html?cat=complementos">Complementos</a>
<div class="submenu">
<a href="tienda.html?cat=cojines">Cojines</a>
<a href="tienda.html?cat=maceteros">Maceteros</a>
<a href="tienda.html?cat=lamparas">Lámparas</a>
</div>
<a href="contacto.html">Contacto</a><a href="faq.html">FAQ</a></nav>
  </div>
  <div class="overlay-backdrop" id="backdrop"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-head"><h2>Carrito</h2><button class="menu-close" id="cartClose">×</button></div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer"><div class="cart-total"><span>Total</span><span id="cartTotal">$0</span></div>
    <a href="checkout.html" class="btn-checkout">Ir a pagar</a></div>
  </aside>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    const id=new URLSearchParams(location.search).get('id');
    const p=PRODUCTS.find(x=>x.id===id)||PRODUCTS[0];
    const catLabel=(CATEGORIES.find(c=>c[0]===p.cat)||['','Muebles'])[1];
    let qty=1;
    document.getElementById('pdp').innerHTML=`
      <div class="crumbs"><a href="index.html">Inicio</a> / <a href="tienda.html">Muebles</a> / <a href="tienda.html?cat=${p.cat}">${catLabel}</a></div>
      <div class="pdp-grid">
        <div class="pdp-img"><img src="${p.img}" alt="${p.name}" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1538688525198-9b88f6f53126?auto=format&fit=crop&w=900&q=80'"></div>
        <div class="pdp-info">
          <h1>${p.name}</h1>
          <p class="pdp-price">${fmt(p.price)}</p>
          <p class="desc">Pieza de autor diseñada y fabricada en Chile. Materiales nobles seleccionados, líneas depuradas y acabado artesanal que perdura en el tiempo.</p>
          <div class="qty"><button id="minus">−</button><span id="qval">1</span><button id="plus">+</button></div>
          <button class="pdp-add" id="addBtn">Agregar al carrito</button>
          <div class="pdp-meta"><strong>Categoría:</strong> ${catLabel}<br><strong>Despacho:</strong> a todo Chile · 7 a 15 días hábiles<br><strong>SKU:</strong> FJ-${p.id.toUpperCase()}</div>
        </div>
      </div>`;
    document.getElementById('minus').onclick=()=>{qty=Math.max(1,qty-1);document.getElementById('qval').textContent=qty};
    document.getElementById('plus').onclick=()=>{qty++;document.getElementById('qval').textContent=qty};
    document.getElementById('addBtn').onclick=()=>{for(let i=0;i<qty;i++)LukCart.addToCart(p)};
    // relacionados
    const rel=PRODUCTS.filter(x=>x.cat===p.cat&&x.id!==p.id).slice(0,4);
    const pool=rel.length?rel:PRODUCTS.filter(x=>x.id!==p.id).slice(0,4);
    document.getElementById('rel').innerHTML=pool.map(r=>`<div class="card">
      <a class="ph" href="producto.html?id=${r.id}"><img src="${r.img}" alt="${r.name}" loading="lazy" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1538688525198-9b88f6f53126?auto=format&fit=crop&w=900&q=80'"></a>
      <h3><a href="producto.html?id=${r.id}">${r.name}</a></h3><p class="price">${fmt(r.price)}</p></div>`).join('');
    document.title=p.name+' · FORJA';
  </script>
</body>
</html>
