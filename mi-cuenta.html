<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi cuenta · FORJA</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body{background:#fff}
  .overlay-header{position:sticky;color:#333;border-bottom:1px solid var(--line);background:#fff}
  .overlay-header .menu-btn span{background:#333}.overlay-header .logo-mark{color:#333;text-shadow:none}
  .overlay-header .hicon{color:#333}.overlay-header .cart-count{background:#333;color:#fff}
  .account{max-width:920px;margin:0 auto;padding:4rem 2rem 6rem}
  .account h1{text-align:center;font-weight:400;font-size:2rem;letter-spacing:.05em;margin-bottom:.6rem}
  .tabs{display:flex;justify-content:center;gap:2rem;margin:1.5rem 0 3rem}
  .tabs button{font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:#999;padding-bottom:.4rem;border-bottom:1px solid transparent}
  .tabs button.active{color:#333;border-color:#333}
  .panes{max-width:380px;margin:0 auto}
  .pane{display:none}.pane.active{display:block}
  .field{margin-bottom:1.1rem}
  .field label{display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-bottom:.4rem}
  .field input{width:100%;padding:.8rem .9rem;border:1px solid var(--line);font-family:inherit;font-size:.95rem}
  .field input:focus{outline:none;border-color:#333}
  .sub{width:100%;background:#333;color:#fff;padding:1rem;letter-spacing:.18em;text-transform:uppercase;font-size:.72rem;transition:.25s}
  .sub:hover{background:#000}
  .muted{font-size:.78rem;color:#999;text-align:center;margin-top:1.2rem}
  .muted a{border-bottom:1px solid #ccc}
</style>
</head>
<body>
  <header class="overlay-header">
    <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
    <a href="index.html" class="logo"><span class="logo-mark"><img src="logo.png" alt="Forja · Diseño · Madera · Acero"></span></a>
    <div class="header-actions">
      <button class="hicon cart-btn" id="cartBtn"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 7h12l-1 13H7L6 7z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M9 7a3 3 0 0 1 6 0" fill="none" stroke="currentColor" stroke-width="1.5"/></svg><span class="cart-count" id="cartCount">0</span></button>
    </div>
  </header>

  <section class="account">
    <h1>Mi cuenta</h1>
    <div class="tabs">
      <button class="active" data-pane="login">Iniciar sesión</button>
      <button data-pane="register">Crear cuenta</button>
    </div>
    <div class="panes">
      <form class="pane active" id="login">
        <div class="field"><label>Email</label><input required type="email"></div>
        <div class="field"><label>Contraseña</label><input required type="password"></div>
        <button class="sub" type="submit">Entrar</button>
        <p class="muted"><a href="#">¿Olvidaste tu contraseña?</a></p>
      </form>
      <form class="pane" id="register">
        <div class="field"><label>Nombre</label><input required></div>
        <div class="field"><label>Email</label><input required type="email"></div>
        <div class="field"><label>Contraseña</label><input required type="password"></div>
        <button class="sub" type="submit">Crear cuenta</button>
        <p class="muted">Al registrarte aceptas nuestros términos y política de privacidad.</p>
      </form>
    </div>
  </section>

  <div class="menu-panel" id="menuPanel">
    <button class="menu-close" id="menuClose">×</button>
    <nav class="menu-nav"><a href="index.html">Inicio</a><a href="tienda.html">Muebles</a>
<div class="submenu"><a href="tienda.html?cat=centro">Mesa de Centro</a>
<a href="tienda.html?cat=auxiliar">Mesa Auxiliar</a>
<a href="tienda.html?cat=comedor">Mesa Comedor</a></div>
<a href="tienda.html?cat=sillas">Sillas</a>
<div class="submenu">
<a href="tienda.html?cat=silla-comedor">Silla Comedor</a>
<a href="tienda.html?cat=sitial">Sitial</a>
<a href="tienda.html?cat=banqueta">Banqueta</a>
<a href="tienda.html?cat=banca">Banca</a>
</div><a href="tienda.html?cat=complementos">Complementos</a>
<div class="submenu">
<a href="tienda.html?cat=cojines">Cojines</a>
<a href="tienda.html?cat=maceteros">Maceteros</a>
<a href="tienda.html?cat=lamparas">Lámparas</a>
</div>
<a href="contacto.html">Contacto</a><a href="faq.html">FAQ</a></nav>
  </div>
  <div class="overlay-backdrop" id="backdrop"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-head"><h2>Carrito</h2><button class="menu-close" id="cartClose">×</button></div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer"><div class="cart-total"><span>Total</span><span id="cartTotal">$0</span></div><a href="checkout.html" class="btn-checkout">Ir a pagar</a></div>
  </aside>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
      document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');document.getElementById(b.dataset.pane).classList.add('active');
    });
    document.querySelectorAll('.pane').forEach(f=>f.addEventListener('submit',e=>{e.preventDefault();alert('Demostración · la autenticación requiere backend.')}));
  </script>
</body>
</html>
